<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BH DEVELOPER NOIR</title>
    <base href="/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Styles/tailwind.css" />
    <link href="Portfolio.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <!-- Scanline overlay -->
            <div class="scanlines"></div>

            <!-- Background gradient blobs -->
            <div class="loading-blob blob-1"></div>
            <div class="loading-blob blob-2"></div>
            <div class="loading-blob blob-3"></div>

            <!-- Center content -->
            <div class="loading-content">
                <!-- Pulsing ring -->
                <div class="ring-container">
                    <div class="ring ring-1"></div>
                    <div class="ring ring-2"></div>
                    <div class="ring ring-3"></div>
                    <div class="core-dot"></div>
                </div>

                <!-- Title with glitch -->
                <h1 class="loading-title">
                    <span class="glitch" data-text="BH">BH</span>
                </h1>
                <h2 class="loading-subtitle">DEVELOPER <span class="text-cyan">NOIR</span>_</h2>

                <!-- Loading bar -->
                <div class="loading-bar-container">
                    <div class="loading-bar-fill"></div>
                </div>
                <div class="loading-status">INITIALIZING SYSTEM</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script>
        (function () {
            const fill = document.querySelector('.loading-bar-fill');
            const status = document.querySelector('.loading-status');
            const statuses = ['INITIALIZING SYSTEM', 'LOADING ASSETS', 'BUILDING INTERFACE', 'CONNECTING SERVICES', 'ALMOST READY'];
            let step = 0;

            const interval = setInterval(() => {
                step++;
                const progress = Math.min((step / statuses.length) * 100, 100);
                if (fill) fill.style.width = progress + '%';
                if (status && step < statuses.length) status.textContent = statuses[step];
            }, 600);

            window.addEventListener('blazor:started', () => {
                if (status) status.textContent = 'ACTIVATING';
            });

            window.addEventListener('blazor:loaded', () => {
                clearInterval(interval);
                if (fill) fill.style.width = '100%';
                if (status) status.textContent = 'SYSTEM READY';
            });
        })();
    </script>

    <!-- GSAP + Plugins -->
    <script src="js/gsap.min.js"></script>
    <script src="js/ScrollTrigger.min.js"></script>
    <script src="js/ScrollToPlugin.min.js"></script>
    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
